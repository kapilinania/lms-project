<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSTI Jodhpur - Trade Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --border: #e8eaed;
            --text-main: #202124;
            --text-muted: #5f6368;
            --blue: #4285F4;
            --green: #34A853;
            --red: #EA4335;
            --yellow: #FBBC05;
            --purple: #9747FF;
            --radius: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .dashboard-header {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--blue);
        }

        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .dashboard-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        #examCardsContainer {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 20px;
        }

        @media (max-width: 1200px) {
            #examCardsContainer {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            #examCardsContainer {
                grid-template-columns: 1fr;
            }
        }

        .exam-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            position: relative;
            min-height: 240px;
        }

        .exam-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            border-color: var(--card-color-1, var(--blue));
        }

        .exam-icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--card-color-1, #4285F4), var(--card-color-2, #9747FF));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            flex-shrink: 0;
        }

        .exam-icon-circle i {
            font-size: 2rem;
            color: #ffffff;
        }

        .exam-info {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 18px;
        }

        .exam-info h3 {
            margin: 0 0 14px 0;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-main);
        }

        .exam-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .exam-meta-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .exam-meta-item i {
            font-size: 0.85rem;
        }

        .highest-score {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 12px;
        }

        .student-count {
            background: linear-gradient(135deg, var(--card-color-1, #4285F4), var(--card-color-2, #9747FF));
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .student-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.3s;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .student-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--blue);
            transition: width 0.3s;
        }

        .student-card:hover {
            border-color: var(--blue);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(66, 133, 244, 0.2);
        }

        .student-card:hover::before {
            width: 100%;
            opacity: 0.05;
        }

        .student-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .student-number {
            background: var(--border);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .score-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0;
        }

        .score-badge-large {
            font-size: 2rem;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 12px;
        }

        .score-high {
            background: rgba(52, 168, 83, 0.2);
            color: #34A853;
        }

        .score-mid {
            background: rgba(251, 188, 5, 0.2);
            color: #FBBC05;
        }

        .score-low {
            background: rgba(234, 67, 53, 0.2);
            color: #EA4335;
        }

        .card-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .loading-state {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(66, 133, 244, 0.3);
            border-radius: 50%;
            border-top-color: var(--blue);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-state {
            text-align: center;
            padding: 40px;
            color: #EA4335;
        }

        .breadcrumb-custom {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .breadcrumb-link {
            color: var(--blue);
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb-link:hover {
            text-decoration: underline;
        }

        .exam-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .exam-header h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        .exam-stats {
            display: flex;
            gap: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- LEADERBOARD GRID DESIGN --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 20px;
        }

        @media (max-width: 1024px) {
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        /* General Card Updates */
        .student-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .rank-badge {
            position: absolute;
            top: -2px;
            right: 20px;
            width: 40px;
            height: 50px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-top: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-muted);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 2;
        }

        /* Top 3 Styling */
        .card-rank-1 {
            border-color: #FFD700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
            background: linear-gradient(145deg, var(--surface) 80%, rgba(255, 215, 0, 0.05) 100%);
        }
        .card-rank-1:hover {
            border-color: #FFD700;
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.2);
        }
        .card-rank-1 .rank-badge { background: linear-gradient(135deg, #FFE066, #FFD700); color: #000; border-color: #FFD700; }
        .card-rank-1::after {
            content: '\F2A4'; /* bi-crown-fill */
            font-family: bootstrap-icons;
            position: absolute;
            top: 15px;
            right: 70px;
            font-size: 1.8rem;
            color: #FFD700;
            opacity: 0.2;
        }

        .card-rank-2 {
            border-color: #C0C0C0;
            background: linear-gradient(145deg, var(--surface) 80%, rgba(192, 192, 192, 0.05) 100%);
        }
        .card-rank-2 .rank-badge { background: linear-gradient(135deg, #E0E0E0, #C0C0C0); color: #000; border-color: #C0C0C0; }

        .card-rank-3 {
            border-color: #CD7F32;
            background: linear-gradient(145deg, var(--surface) 80%, rgba(205, 127, 50, 0.05) 100%);
        }
        .card-rank-3 .rank-badge { background: linear-gradient(135deg, #E6A87C, #CD7F32); color: #fff; border-color: #CD7F32; }

    </style>
</head>

<body>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="theme-btn"><i class="bi bi-moon-fill"></i></button>

    <header class="dashboard-header">
        <div class="container d-flex align-items-center justify-content-between">
            <div>
                <h1 class="dashboard-title" id="tradeTitle">Loading...</h1>
                <p class="dashboard-subtitle">Student Performance & Results</p>
            </div>
            <a href="index.html" class="back-btn"><i class="bi bi-arrow-left"></i> Back to Home</a>
        </div>
    </header>

    <main class="container mb-5">
        <!-- Loading State -->
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>Fetching latest results...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="error-state" style="display: none;">
            <i class="bi bi-exclamation-circle" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
            <p id="errorMsg">Failed to load data.</p>
            <button onclick="location.reload()" class="btn btn-outline-light btn-sm mt-2">Retry</button>
        </div>

        <!-- Exam List View -->
        <div id="examListView" style="display: none;">
            <div class="breadcrumb-custom">
                <i class="bi bi-house-door"></i>
                <span id="tradeBreadcrumb"></span>
            </div>
            <div id="examCardsContainer"></div>
        </div>

        <!-- Exam Detail View -->
        <div id="examDetailView" style="display: none;">
            <div class="breadcrumb-custom">
                <i class="bi bi-house-door"></i>
                <span id="tradeBreadcrumb2"></span>
                <i class="bi bi-chevron-right"></i>
                <a class="breadcrumb-link" id="backToExams">Exams</a>
                <i class="bi bi-chevron-right"></i>
                <span id="currentExamName"></span>
            </div>

            <div class="exam-header">
                <h2 id="examDetailTitle"></h2>
                <div class="exam-stats">
                    <span><i class="bi bi-people"></i> <strong id="totalStudents">0</strong> Students</span>
                    <span><i class="bi bi-graph-up"></i> Avg Score: <strong id="avgScore">0</strong></span>
                    <span><i class="bi bi-trophy"></i> Highest: <strong id="highScore">0</strong></span>
                </div>
            </div>

            <!-- Leaderboard Grid -->
            <div class="results-grid" id="resultsGrid">
                <!-- Ranked students will be inserted here -->
            </div>
        </div>
    </main>

    <script src="dashboard-script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - NSTI Jodhpur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --border: #e8eaed;
            --text-main: #202124;
            --text-muted: #5f6368;
            --blue: #4285F4;
            --radius: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .content-box {
            padding: 20px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(42, 42, 42, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 2rem;
            color: var(--text-muted);
        }

        h1 {
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto 40px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 100px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: rgba(66, 133, 244, 0.2);
            border-color: var(--blue);
            color: var(--blue);
        }
    </style>
</head>

<body>
    <div class="content-box">
        <div class="icon-circle"><i class="bi bi-clock-history"></i></div>
        <h1>Coming Soon</h1>
        <p>The dashboard for this trade is currently under development. Please check back later for updates.</p>
        <a href="index.html" class="btn-home"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="theme-btn"><i class="bi bi-moon-fill"></i></button>

    <script>
        // Theme Toggle with LocalStorage
        const themeBtn = document.getElementById('theme-btn');
        const icon = themeBtn.querySelector('i');
        const html = document.documentElement;

        // Load saved theme or default to light
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        icon.className = savedTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';

        themeBtn.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            if (current === 'light') {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'bi bi-sun-fill';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                icon.className = 'bi bi-moon-fill';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>

</html>

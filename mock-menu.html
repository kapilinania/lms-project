<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>NSTI Jodhpur - Mock Directory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* --- VARIABLES --- */
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --surface-light: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
            --blue: #4285F4;
            --red: #EA4335;
            --yellow: #FBBC05;
            --green: #34A853;
            --radius: 24px;
            --shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            --glow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface-light: #f1f3f5;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(66, 133, 244, 0.05) 0%, transparent 50%);
        }

        /* --- HEADER --- */
        .header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        [data-theme="light"] .header {
            background: rgba(255, 255, 255, 0.7);
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-btn:hover {
            color: var(--blue);
        }

        /* --- CONTAINER --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- BREADCRUMB --- */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        
        .crumb {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .crumb:hover {
            color: var(--text-main);
        }
        
        .crumb.active {
            color: var(--blue);
            cursor: default;
        }

        /* --- GRID --- */
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* --- CARDS --- */
        .folder-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .folder-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue);
            box-shadow: 0 10px 30px rgba(66, 133, 244, 0.1);
        }

        .folder-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(66, 133, 244, 0.1);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .folder-content h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .folder-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .enter-icon {
            margin-left: auto;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .folder-card:hover .enter-icon {
            color: var(--blue);
            transform: translateX(5px);
        }

        /* --- TEST CARD (Final Level) --- */
        .test-card {
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.1), transparent);
            border: 1px solid var(--blue);
            text-align: center;
            padding: 40px;
            border-radius: 24px;
        }

        .btn-start {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--blue);
            color: #fff;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(66, 133, 244, 0.3);
        }

    </style>
    <!-- Include Data Source -->
    <script src="mock-csa-data.js"></script>
</head>

<body>

    <header class="header">
        <a href="index.html" class="back-btn">
            <i class="bi bi-arrow-left"></i> Home
        </a>
        <h3 style="margin: 0;">Syllabus Directory</h3>
        <!-- Theme Toggle -->
        <button id="themeBtn" style="background: none; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer;">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </header>

    <div class="container">
        
        <div class="breadcrumb" id="breadcrumb">
            <!-- Breadcrumbs injected here -->
        </div>

        <div class="directory-grid" id="directory">
            <!-- Folders injected here -->
        </div>

    </div>

    <script>
        // --- THEME LOGIC ---
        const themeBtn = document.getElementById('themeBtn');
        const icon = themeBtn.querySelector('i');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        icon.className = savedTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';

        themeBtn.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            if (current === 'light') {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'bi bi-sun-fill';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                icon.className = 'bi bi-moon-stars-fill';
                localStorage.setItem('theme', 'light');
            }
        });

        // --- DIRECTORY LOGIC ---
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        let rootTrade = urlParams.get('trade') || "CSA";
        
        // Ensure trade exists in DB, else default
        if (!MOCK_DATABASE[rootTrade]) rootTrade = "CSA";

        // Navigation state array 
        // Example: ["CSA", "Theory", "PHP"]
        let currentPath = [rootTrade];

        const breadcrumbEl = document.getElementById('breadcrumb');
        const directoryEl = document.getElementById('directory');

        function renderDirectory() {
            // 1. Resolve current object based on path
            let currentObj = MOCK_DATABASE;
            for (let i = 0; i < currentPath.length; i++) {
                let key = currentPath[i];
                if (currentObj[key]) {
                     currentObj = currentObj[key];
                } else if (currentObj.subjects && currentObj.subjects[key]) {
                     currentObj = currentObj.subjects[key];
                } else {
                     console.error("Path resolution failed at:", key);
                }
            }

            // 2. Render Breadcrumb
            breadcrumbEl.innerHTML = '';
            currentPath.forEach((part, index) => {
                const crumb = document.createElement('div');
                crumb.className = "crumb";
                if (index === currentPath.length - 1) crumb.classList.add('active');
                
                crumb.innerHTML = `<span>${part}</span>`;
                if(index < currentPath.length - 1) {
                     crumb.innerHTML += `<i class="bi bi-chevron-right" style="font-size:0.8rem"></i>`;
                }

                crumb.addEventListener('click', () => {
                    if (index < currentPath.length - 1) {
                        currentPath = currentPath.slice(0, index + 1);
                        renderDirectory();
                    }
                });

                breadcrumbEl.appendChild(crumb);
            });

            // 3. Render Content (Folders or Test Button)
            directoryEl.innerHTML = '';

            // CASE A: It's an Array -> It's a list of questions! Render the Start Test button.
            if (Array.isArray(currentObj)) {
                directoryEl.style.display = 'block'; // Remove grid for a single card
                const count = currentObj.length;
                
                // Construct query URL
                // We need to pass the path so mock-test.html knows exactly where to load from.
                const queryStr = currentPath.map(p => encodeURIComponent(p)).join('|');

                // Read Analytics
                const storedUser = JSON.parse(localStorage.getItem('exam_user') || '{"mobile":"guest"}');
                const userMobile = storedUser.mobile;
                const statsKey = `mock_stats_${userMobile}_${queryStr}`;
                const rawStats = localStorage.getItem(statsKey);
                
                let stats = { attempts: 0, bestScore: 0, rank: "Untested" };
                if (rawStats) {
                    try { stats = JSON.parse(rawStats); } catch(e){}
                }

                // Rank Styling
                let rankBadge = `<span style="background: var(--surface-light); padding: 5px 12px; border-radius: 12px; font-size: 0.9rem;">${stats.rank}</span>`;
                if(stats.rank === "Expert 🏆") rankBadge = `<span style="background: rgba(34, 197, 94, 0.2); color: var(--success); border: 1px solid var(--success); padding: 5px 12px; border-radius: 12px; font-size: 0.9rem; font-weight:bold;">${stats.rank}</span>`;
                else if(stats.rank === "Proficient 🌟") rankBadge = `<span style="background: rgba(66, 133, 244, 0.2); color: var(--blue); border: 1px solid var(--blue); padding: 5px 12px; border-radius: 12px; font-size: 0.9rem; font-weight:bold;">${stats.rank}</span>`;
                else if(stats.attempts > 0) rankBadge = `<span style="background: rgba(234, 67, 53, 0.2); color: var(--red); border: 1px solid var(--red); padding: 5px 12px; border-radius: 12px; font-size: 0.9rem; font-weight:bold;">${stats.rank}</span>`;

                directoryEl.innerHTML = `
                    <div class="test-card">
                        <div style="font-size: 3rem; color: var(--blue); margin-bottom: 10px;">
                            <i class="bi bi-card-checklist"></i>
                        </div>
                        <h2 style="margin-bottom: 5px;">${currentPath[currentPath - 2] ? currentPath[currentPath.length - 2] + ' - ' : ''}${currentPath[currentPath.length - 1]} Mock Test</h2>
                        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px;">This set contains ${count} important practice questions.</p>
                        
                        <!-- Mini Analytics Dashboard -->
                        <div style="background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; max-width: 500px; margin: 0 auto 30px auto; display: flex; justify-content: space-around; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                             <div>
                                 <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Attempts</div>
                                 <div style="font-size: 1.5rem; font-weight: bold; margin-top: 5px;">${stats.attempts}</div>
                             </div>
                             <div style="width: 1px; background: var(--border);"></div>
                             <div>
                                 <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Best Score</div>
                                 <div style="font-size: 1.5rem; font-weight: bold; margin-top: 5px;">${stats.bestScore} <span style="font-size:0.9rem; font-weight:normal; color:var(--text-muted)">/ ${count}</span></div>
                             </div>
                             <div style="width: 1px; background: var(--border);"></div>
                             <div>
                                 <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Mastery</div>
                                 <div style="margin-top: 10px;">${rankBadge}</div>
                             </div>
                        </div>

                        ${count > 0 ? `
                        <button onclick="window.location.href='mock-test.html?path=${queryStr}'" class="btn-start">
                             ${stats.attempts > 0 ? "Re-take Practice Test" : "Begin Practice Test"} <i class="bi bi-play-fill"></i>
                        </button>
                        ` : `<button class="btn-start" style="background: var(--surface-light); color: var(--text-muted); cursor: not-allowed;">Coming Soon</button>`}
                    </div>
                `;
                return;
            }

            // CASE B: It's an Object (Directory Folder)
            directoryEl.style.display = 'grid'; // Restore grid
            
            // A helper to get the keys we should iterate over.
            // If the object has a "subjects" key, we iterate over the subjects.
            let iterableKeys = [];
            let targetObj = currentObj;
            
            if (currentObj.subjects) {
                targetObj = currentObj.subjects;
            }
            iterableKeys = Object.keys(targetObj).filter(k => k !== 'icon');

            iterableKeys.forEach(key => {
                const isArray = Array.isArray(targetObj[key]);
                // Determine icon. If object has defining icon use it, else generic.
                let iconClass = "bi-folder";
                if (targetObj[key] && targetObj[key].icon) iconClass = targetObj[key].icon;
                if (isArray) iconClass = "bi-file-earmark-text"; // Leaf node

                const card = document.createElement('div');
                card.className = "folder-card";
                card.innerHTML = `
                    <div class="folder-icon">
                        <i class="bi ${iconClass}"></i>
                    </div>
                    <div class="folder-content">
                        <h3>${key}</h3>
                        <p>${isArray ? targetObj[key].length + ' Questions' : 'Open Module'}</p>
                    </div>
                    <i class="bi bi-chevron-right enter-icon"></i>
                `;

                card.addEventListener('click', () => {
                    currentPath.push(key);
                    renderDirectory();
                });

                directoryEl.appendChild(card);
            });
        }

        // Init
        renderDirectory();

    </script>
</body>
</html>
